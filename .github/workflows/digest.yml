name: marketing-digest

# Расписание в UTC, исходя из Asia/Ho_Chi_Minh (UTC+7):
# - 01:30 UTC = 08:30 локально (ежедневный дайджест)
# - 01:00 UTC = 08:00 локально (горящие)
# - 12:00 UTC = 19:00 локально (горящие)
on:
  schedule:
    - cron: "30 1 * * *"   # daily digest
    - cron: "0 1 * * *"    # alert
    - cron: "0 12 * * *"   # alert
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Pick mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 1 * * *" ] || [ "${{ github.event.schedule }}" = "0 12 * * *" ]; then
            echo "mode=alert" >> "$GITHUB_OUTPUT"
          else
            echo "mode=digest" >> "$GITHUB_OUTPUT"
          fi

      - name: Run agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIGEST_LANGUAGE: "ru"          # поставь "uk" для украинского
          MODE: ${{ steps.mode.outputs.mode || 'digest' }}
        run: python digest_agent.py
